<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #f8fafc;
      }
      .card {
        max-width: 520px;
        margin: 24px;
        padding: 24px;
        border-radius: 16px;
        background: #111827;
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
      }
      h1 {
        margin: 0 0 8px 0;
        font-size: 22px;
      }
      p {
        margin: 0;
        color: #cbd5f5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>Reconnect to continue. Cached pages may still be available.</p>
    </div>
  </body>
</html>
